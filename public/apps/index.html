<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>T2T App Dashboards</title>
  <link rel="stylesheet" href="/styles/base.css?v=20260616-layout-v1" />
  <link rel="stylesheet" href="/styles/workspaces.css?v=20260616-layout-v1" />
  <style>
    .app-list-shell { display:grid; gap:18px; }
    .app-dashboard-grid { display:grid; gap:14px; }
    .app-dashboard-card { display:grid; gap:14px; padding:20px; border:1px solid var(--line); border-radius:22px; background:rgba(255,255,255,.68); color:var(--ink); text-decoration:none; transition:transform 160ms ease,border-color 160ms ease,box-shadow 160ms ease; }
    .app-dashboard-card:hover { transform:translateY(-1px); border-color:rgba(13,111,91,.24); box-shadow:0 14px 34px rgba(54,41,18,.1); }
    .app-dashboard-head, .app-dashboard-brand, .app-dashboard-stats { display:flex; gap:14px; align-items:center; justify-content:space-between; flex-wrap:wrap; }
    .app-dashboard-brand { justify-content:flex-start; }
    .app-dashboard-logo-link { display:inline-grid; place-items:center; flex:0 0 auto; color:inherit; text-decoration:none; border-radius:16px; }
    .app-dashboard-logo-link:focus-visible { outline:3px solid rgba(13,111,91,.18); outline-offset:4px; }
    .app-dashboard-head-actions { display:flex; align-items:flex-start; justify-content:flex-end; gap:8px; flex-wrap:wrap; }
    .app-dashboard-body-link { display:grid; gap:14px; color:inherit; text-decoration:none; }
    .app-dashboard-body-link:focus-visible { outline:3px solid rgba(13,111,91,.18); outline-offset:4px; border-radius:18px; }
    .app-dashboard-brand img, .app-dashboard-logo-fallback {
      width:52px; height:52px; border-radius:14px; object-fit:cover; flex:0 0 auto; display:grid; place-items:center;
      background:rgba(14,124,102,.12); color:var(--accent-strong); font-weight:900;
    }
    .app-dashboard-head h2 { margin:0; font-size:24px; }
    .app-dashboard-stats div { min-width:110px; padding:14px 16px; border:1px solid rgba(25,23,19,.1); border-radius:18px; background:rgba(255,250,242,.82); display:grid; gap:6px; }
    .app-dashboard-stats span { color:var(--muted); font-size:13px; font-weight:800; }
    .app-dashboard-stats strong { font-size:28px; }
    .app-dashboard-notes { display:grid; gap:8px; }
    .app-dashboard-notes p { margin:0; color:var(--muted); line-height:1.7; }
    .app-dashboard-video-line, .app-dashboard-note-line { display:flex; min-width:0; gap:4px; }
    .app-dashboard-video-line strong, .app-dashboard-note-line strong { flex:0 0 auto; color:var(--ink); }
    .app-dashboard-video-line span, .app-dashboard-note-line span { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  </style>
</head>
<body>
  <div class="page-shell">
    <nav class="top-link-nav" aria-label="站点导航">
      <div class="brand-lockup">
        <img class="brand-logo" src="/assets/t2t-logo.svg" width="140" height="40" alt="T2T" />
        <p class="brand-subtitle">App Dashboards</p>
      </div>
      <div class="top-link-actions">
        <a class="system-link" href="/">首页</a>
        <a class="system-link" href="/ingest">录入数据</a>
        <a class="system-link" href="/reports">分析输出</a>
      </div>
    </nav>

    <main class="app-list-shell">
      <section class="panel" style="padding:20px;">
        <div class="section-head">
          <div>
            <p class="section-kicker">Apps</p>
            <h1>各 App Dashboard</h1>
            <p class="helper-text">首版先把每个 App 的视频、文章、数据量和最近记录拉起来，作为后续工作台入口。</p>
          </div>
        </div>
      </section>
      <section class="panel" style="padding:20px;">
        <div id="status" class="status-card">准备中...</div>
        <div id="app-dashboard-list" class="app-dashboard-grid" style="margin-top:18px;"></div>
      </section>
    </main>
  </div>
  <div id="toast" class="toast" hidden></div>
  <script type="module" src="/js/apps-dashboard.js"></script>
  <script type="module" src="/js/core/breadcrumb.js"></script>
</body>
</html>
