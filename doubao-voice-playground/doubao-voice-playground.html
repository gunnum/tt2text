<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Doubao Voice Playground</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f2e9;
      --panel: #fffaf0;
      --ink: #211f1b;
      --muted: #6f675b;
      --line: #ddd2bf;
      --accent: #1b6f5c;
      --danger: #a7342d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px;
    }
    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 22px;
    }
    h1 {
      margin: 0;
      font-size: 30px;
      letter-spacing: 0;
    }
    .hint {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }
    .grid {
      display: grid;
      grid-template-columns: minmax(360px, 460px) 1fr;
      gap: 20px;
      align-items: start;
    }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      box-shadow: 0 12px 34px rgba(38, 31, 21, .06);
    }
    h2 {
      margin: 0 0 14px;
      font-size: 18px;
    }
    label {
      display: block;
      margin: 14px 0 7px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
    }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffdf8;
      color: var(--ink);
      padding: 10px 11px;
      font: inherit;
      outline: none;
    }
    textarea {
      min-height: 150px;
      resize: vertical;
      line-height: 1.5;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(27, 111, 92, .14);
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .compact-row {
      gap: 8px;
      margin-top: 6px;
    }
    .segmented {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fffdf8;
      padding: 4px;
      min-height: 86px;
    }
    .segment {
      border: 0;
      border-radius: 6px;
      padding: 10px 8px;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-size: 15px;
      font-weight: 800;
      line-height: 1.25;
      cursor: pointer;
    }
    .segment.active {
      background: var(--accent);
      color: white;
    }
    .segment:disabled {
      cursor: not-allowed;
      opacity: .48;
    }
    .field-note {
      margin-top: 7px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
    .toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      color: var(--ink);
      font-weight: 600;
    }
    .toggle input {
      width: auto;
      transform: scale(1.15);
    }
    button {
      border: 0;
      border-radius: 8px;
      padding: 11px 14px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      background: var(--accent);
      color: white;
    }
    button.secondary {
      background: #e7ddcd;
      color: var(--ink);
    }
    button.danger {
      background: var(--danger);
    }
    button:disabled {
      opacity: .55;
      cursor: not-allowed;
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      align-items: center;
    }
    .status {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }
    .result {
      border: 1px solid var(--line);
      background: #fffdf8;
      border-radius: 8px;
      padding: 14px;
      margin: 0 0 14px;
    }
    .result-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    .result-title {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.4;
    }
    .result-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }
    .result-actions button {
      padding: 8px 10px;
      font-size: 13px;
    }
    .param-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 10px 0 8px;
    }
    .param-chip {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8f1e6;
      padding: 6px 9px;
      min-width: 72px;
    }
    .param-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 4px;
    }
    .param-value {
      color: var(--ink);
      font-size: 14px;
      font-weight: 800;
      line-height: 1.25;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      word-break: break-word;
    }
    audio {
      width: 100%;
      margin: 10px 0 8px;
    }
    details {
      margin-top: 10px;
      color: var(--muted);
    }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #f1eadc;
      border-radius: 8px;
      padding: 10px;
      overflow: auto;
      color: #312b22;
      font-size: 12px;
    }
    .empty {
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 24px;
      text-align: center;
      background: rgba(255,255,255,.35);
    }
    @media (max-width: 900px) {
      main { padding: 18px; }
      .grid { grid-template-columns: 1fr; }
      header { display: block; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Doubao Voice Playground</h1>
        <p class="hint">本页只调用本地后端代理。API_KEY 和 APP_ID 从 macOS Keychain 读取，不会出现在页面或请求体里。</p>
      </div>
      <a href="/" class="status">返回工作台</a>
    </header>

    <div class="grid">
      <section>
        <h2>生成参数</h2>
        <label for="text">文本</label>
        <textarea id="text">Maybe the problem isn’t your willpower.</textarea>

        <div class="row">
          <div>
            <label>接口</label>
            <div id="endpoint" class="segmented" role="radiogroup" aria-label="接口"></div>
            <div id="endpointNote" class="field-note"></div>
          </div>
          <div>
            <label for="voiceType">音色 voice_type</label>
            <select id="voiceType"></select>
          </div>
        </div>

        <div class="row">
          <div>
            <label for="format">格式</label>
            <select id="format"></select>
          </div>
          <div>
            <label for="sampleRate">采样率</label>
            <select id="sampleRate"></select>
          </div>
        </div>

        <div class="row">
          <div>
            <label for="speed">语速 speed</label>
            <input id="speed" type="number" step="0.05" min="0.5" max="2" value="1" />
          </div>
          <div>
            <label for="volume">音量 volume</label>
            <input id="volume" type="number" step="0.05" min="0.1" max="3" value="1" />
          </div>
        </div>

        <div class="row">
          <div>
            <label for="pitch">音高 pitch</label>
            <input id="pitch" type="number" step="0.05" min="0.5" max="2" value="1" />
          </div>
          <div>
            <label class="toggle"><input id="localSentencePause" type="checkbox" checked /> 本地随机句间隔</label>
            <div class="row compact-row">
              <input id="localSentencePauseMin" type="number" step="0.05" min="0" max="3" value="0.45" aria-label="句间隔最小秒数" />
              <input id="localSentencePauseMax" type="number" step="0.05" min="0" max="3" value="0.85" aria-label="句间隔最大秒数" />
            </div>
            <div class="field-note">左边最小、右边最大，单位秒。每句单独生成后，本地随机插入这个范围内的静音。</div>
          </div>
        </div>

        <div class="row">
          <div>
            <label for="style">风格 style</label>
            <input id="style" placeholder="可空；是否支持取决于音色/接口" />
          </div>
          <div>
            <label for="resourceId">Resource-Id</label>
            <input id="resourceId" placeholder="可空；旧文档可能需要" />
          </div>
        </div>

        <div class="row">
          <label class="toggle"><input id="enableSubtitle" type="checkbox" checked /> 开启字幕时间戳</label>
          <label class="toggle"><input id="wait" type="checkbox" checked /> 等待并下载结果</label>
        </div>

        <div class="row">
          <div>
            <label for="timeout">最长等待秒数</label>
            <input id="timeout" type="number" min="10" max="600" value="180" />
          </div>
          <div>
            <label for="pollInterval">轮询间隔秒数</label>
            <input id="pollInterval" type="number" min="1" max="30" value="3" />
          </div>
        </div>

        <div class="actions">
          <button id="generate">生成音频</button>
          <button id="reset" type="button" class="secondary">恢复默认</button>
        </div>
        <p id="status" class="status">等待生成。</p>
      </section>

      <section>
        <h2>生成结果</h2>
        <div id="results" class="results">
          <div class="empty">生成后会在这里出现试听播放器、任务信息和删除按钮。</div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const state = {
      options: null,
      results: []
    };
    const SETTINGS_STORAGE_KEY = "doubaoVoicePlayground.lastSettings";

    const el = (id) => document.getElementById(id);

    init().catch((error) => {
      setStatus(error.message, true);
    });

    async function init() {
      const options = await fetchJson("/api/doubao-voice/options");
      state.options = options;
      fillOptions(options);
      el("generate").addEventListener("click", generate);
      el("reset").addEventListener("click", () => {
        window.localStorage.removeItem(SETTINGS_STORAGE_KEY);
        fillDefaults(options.defaults);
      });
    }

    function fillOptions(options) {
      fillEndpointOptions(options.endpointOptions);
      fillSelect(el("format"), options.formats.map((item) => [item, item]));
      fillSelect(el("sampleRate"), options.sampleRates.map((item) => [item, item]));
      fillSelect(el("voiceType"), options.voiceTypes.map((item) => ({
        value: item.value,
        label: `${item.label}${item.scene ? `｜${item.scene}` : ""}${item.disabled ? "｜已禁用" : ""}`,
        disabled: item.disabled,
        note: item.note
      })));
      fillDefaults(readSavedSettings() || options.defaults);
    }

    function fillDefaults(defaults) {
      setEndpoint(defaults.endpoint);
      el("voiceType").value = defaults.voice_type;
      el("format").value = defaults.format;
      el("sampleRate").value = defaults.sample_rate;
      el("speed").value = defaults.speed;
      el("volume").value = defaults.volume;
      el("pitch").value = defaults.pitch;
      el("localSentencePause").checked = Boolean(defaults.local_sentence_pause);
      el("localSentencePauseMin").value = defaults.local_sentence_pause_min;
      el("localSentencePauseMax").value = defaults.local_sentence_pause_max;
      el("enableSubtitle").checked = Boolean(defaults.enable_subtitle);
      el("wait").checked = Boolean(defaults.wait);
      el("timeout").value = defaults.timeout_seconds;
      el("pollInterval").value = defaults.poll_interval_seconds;
      el("style").value = "";
      el("resourceId").value = defaults.resource_id || "";
    }

    function fillEndpointOptions(items) {
      const container = el("endpoint");
      container.innerHTML = "";
      for (const item of items) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "segment";
        button.dataset.value = item.value;
        button.setAttribute("role", "radio");
        button.setAttribute("aria-checked", "false");
        button.disabled = Boolean(item.disabled);
        button.title = item.note || "";
        button.textContent = item.label;
        button.addEventListener("click", () => {
          if (item.disabled) return;
          setEndpoint(item.value);
          syncResourceId(item.value);
          setEndpointNote(item.note || "");
        });
        container.appendChild(button);
      }
    }

    function getEndpoint() {
      return el("endpoint").dataset.value || "normal";
    }

    function setEndpoint(value) {
      const container = el("endpoint");
      container.dataset.value = value;
      for (const button of container.querySelectorAll(".segment")) {
        const active = button.dataset.value === value;
        button.classList.toggle("active", active);
        button.setAttribute("aria-checked", active ? "true" : "false");
      }
      const option = state.options?.endpointOptions?.find((item) => item.value === value);
      setEndpointNote(option?.note || "");
    }

    function syncResourceId(endpoint) {
      el("resourceId").value = endpoint === "emotion"
        ? "volc.tts_async.emotion"
        : "volc.tts_async.default";
    }

    function setEndpointNote(message) {
      el("endpointNote").textContent = message;
    }

    function fillSelect(select, items) {
      select.innerHTML = "";
      for (const item of items) {
        const value = Array.isArray(item) ? item[0] : item.value;
        const label = Array.isArray(item) ? item[1] : item.label;
        const option = document.createElement("option");
        option.value = value;
        option.textContent = label;
        option.disabled = Boolean(item.disabled);
        option.title = item.note || "";
        select.appendChild(option);
      }
    }

    async function generate() {
      const payload = readPayload();
      if (!payload.text.trim()) {
        setStatus("请输入文本。", true);
        return;
      }
      saveSettings(payload);
      el("generate").disabled = true;
      setStatus("正在提交任务并等待结果...");
      try {
        const result = await fetchJson("/api/doubao-voice/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        state.results.unshift({ payload, result, createdAt: new Date().toLocaleString() });
        renderResults();
        setStatus(result.file ? "生成完成，已下载到本地。" : "任务已提交，未返回本地音频。");
      } catch (error) {
        setStatus(error.message, true);
      } finally {
        el("generate").disabled = false;
      }
    }

    function readPayload() {
      return {
        text: el("text").value,
        endpoint: getEndpoint(),
        voice_type: el("voiceType").value,
        format: el("format").value,
        sample_rate: Number(el("sampleRate").value),
        speed: Number(el("speed").value),
        volume: Number(el("volume").value),
        pitch: Number(el("pitch").value),
        local_sentence_pause: el("localSentencePause").checked,
        local_sentence_pause_min: Number(el("localSentencePauseMin").value),
        local_sentence_pause_max: Number(el("localSentencePauseMax").value),
        style: el("style").value.trim(),
        resource_id: el("resourceId").value.trim(),
        enable_subtitle: el("enableSubtitle").checked ? 1 : 0,
        wait: el("wait").checked,
        timeout_seconds: Number(el("timeout").value),
        poll_interval_seconds: Number(el("pollInterval").value)
      };
    }

    function readSavedSettings() {
      try {
        return normalizeSettings(JSON.parse(window.localStorage.getItem(SETTINGS_STORAGE_KEY) || "null"));
      } catch {
        return null;
      }
    }

    function saveSettings(payload) {
      window.localStorage.setItem(SETTINGS_STORAGE_KEY, JSON.stringify(payload));
    }

    function normalizeSettings(settings) {
      if (!settings || typeof settings !== "object") return null;
      const defaults = state.options.defaults;
      const endpoint = state.options.endpointOptions.find((item) => item.value === settings.endpoint && !item.disabled);
      const voice = state.options.voiceTypes.find((item) => item.value === settings.voice_type && !item.disabled);
      const endpointValue = endpoint?.value || defaults.endpoint;
      return {
        ...defaults,
        ...settings,
        endpoint: endpointValue,
        resource_id: endpointValue === "emotion" ? "volc.tts_async.emotion" : "volc.tts_async.default",
        voice_type: voice?.value || defaults.voice_type
      };
    }

    function renderResults() {
      const container = el("results");
      container.innerHTML = "";
      if (!state.results.length) {
        container.innerHTML = '<div class="empty">生成后会在这里出现试听播放器、任务信息和删除按钮。</div>';
        return;
      }
      for (const item of state.results) {
        const card = document.createElement("div");
        card.className = "result";
        const file = item.result.file;
        const voice = findVoice(item.payload.voice_type);
        const voiceName = voice?.name || item.payload.voice_type;
        const voiceScene = voice?.scene || "-";
        card.innerHTML = `
          <div class="result-head">
            <div>
              <div class="result-title">${escapeHtml(item.createdAt)} · ${escapeHtml(item.payload.format)} · task: ${escapeHtml(item.result.task_id || "N/A")}</div>
            </div>
            <div class="result-actions">
              ${canRemix(item) ? '<button class="secondary remix" type="button">重新本地合成</button>' : ''}
              ${file ? '<button class="danger delete" type="button">删除</button>' : ''}
            </div>
          </div>
          <div class="param-grid">
            ${renderParam("音色", voiceName)}
            ${renderParam("场景", voiceScene)}
            ${renderParam("语速", item.payload.speed)}
            ${renderParam("音高", item.payload.pitch)}
            ${renderParam("句间隔", formatPauseRange(item))}
            ${item.result.pauses ? renderParam("实际停顿", item.result.pauses.map((pause) => `${pause}s`).join(" / ")) : ""}
            ${item.result.pause_plan ? renderParam("停顿策略", formatPausePlan(item.result.pause_plan)) : ""}
          </div>
          ${file ? `<audio controls src="${escapeAttr(file.url)}"></audio>` : '<div class="meta">未下载音频，所以暂时没有播放器。勾选“等待并下载结果”后生成，会在这里显示试听播放器。</div>'}
          ${file ? `<div class="meta">文件：${escapeHtml(file.path)} · ${formatBytes(file.bytes)}</div>` : ''}
          <details>
            <summary>查看任务返回</summary>
            <pre>${escapeHtml(JSON.stringify(item.result, null, 2))}</pre>
          </details>
        `;
        const remixButton = card.querySelector(".remix");
        if (remixButton) {
          remixButton.addEventListener("click", async () => {
            await remixLocalPause(item);
          });
        }
        if (file) {
          card.querySelector(".delete").addEventListener("click", async () => {
            await deleteFile(file.id);
            state.results = state.results.filter((candidate) => candidate !== item);
            renderResults();
          });
        }
        container.appendChild(card);
      }
    }

    function canRemix(item) {
      return Array.isArray(item.result.source_files) && item.result.source_files.length > 1;
    }

    async function remixLocalPause(item) {
      const payload = {
        source_files: item.result.source_files,
        source_texts: Array.isArray(item.result.parts) ? item.result.parts.map((part) => part.text) : [],
        local_sentence_pause_min: Number(el("localSentencePauseMin").value),
        local_sentence_pause_max: Number(el("localSentencePauseMax").value)
      };
      setStatus("正在按当前句间隔范围重新本地合成...");
      const result = await fetchJson("/api/doubao-voice/remix-local-pause", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const nextPayload = {
        ...item.payload,
        local_sentence_pause: true,
        local_sentence_pause_min: payload.local_sentence_pause_min,
        local_sentence_pause_max: payload.local_sentence_pause_max
      };
      state.results.unshift({ payload: nextPayload, result, createdAt: new Date().toLocaleString() });
      renderResults();
      setStatus("重新本地合成完成。");
    }

    function findVoice(value) {
      const item = state.options?.voiceTypes?.find((candidate) => candidate.value === value);
      if (!item) return null;
      const name = String(item.label || value).split("·")[0].trim();
      return { name, scene: item.scene || "" };
    }

    function renderParam(label, value) {
      return `
        <div class="param-chip">
          <div class="param-label">${escapeHtml(label)}</div>
          <div class="param-value" title="${escapeAttr(value)}">${escapeHtml(value)}</div>
        </div>
      `;
    }

    function formatPauseRange(item) {
      if (!item.payload.local_sentence_pause) return "关闭";
      return `${item.payload.local_sentence_pause_min}-${item.payload.local_sentence_pause_max}s`;
    }

    function formatPausePlan(plan) {
      return plan.map((item) => item.method === "length_weighted" ? `w${item.weight}` : "random").join(" / ");
    }

    async function deleteFile(id) {
      await fetchJson("/api/doubao-voice/delete", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id })
      });
      setStatus("已删除本地音频。");
    }

    async function fetchJson(url, options = {}) {
      const response = await fetch(url, options);
      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data.error || `HTTP ${response.status}`);
      }
      return data;
    }

    function setStatus(message, isError = false) {
      el("status").textContent = message;
      el("status").style.color = isError ? "var(--danger)" : "var(--muted)";
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function escapeAttr(value) {
      return escapeHtml(value).replaceAll("'", "&#39;");
    }

    function formatBytes(bytes) {
      if (!Number.isFinite(bytes)) return "";
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
      return `${(bytes / 1024 / 1024).toFixed(1)} MB`;
    }
  </script>
</body>
</html>
